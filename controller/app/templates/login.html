<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · N-RunMesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b'
            }
          }
        }
      }
    }
  </script>
  <!-- Notyf (toast notifications) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-50 via-white to-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white/90 backdrop-blur rounded-3xl shadow-sm ring-1 ring-slate-200 overflow-hidden">
      <div class="px-6 py-6 bg-brand-50">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-xs font-semibold text-brand-700">N-RunMesh</div>
            <h1 class="text-xl font-semibold text-slate-900 mt-1">Distributed Job Scheduler</h1>
            <p class="text-xs text-slate-600 mt-1">Sign in to manage jobs & view logs</p>
          </div>
          <div class="h-10 w-10 rounded-2xl bg-brand-200 flex items-center justify-center text-brand-800 font-bold">
            S
          </div>
        </div>
      </div>

      <div class="px-6 py-6">

        {# Inline fallback (in case toast doesn't render) #}
        {% if error %}
          <div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800">
            <div class="font-semibold">Login failed</div>
            <div class="mt-1">{{ error }}</div>
          </div>
        {% endif %}

        <form method="post" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700">Username</label>
            <input
              name="username"
              autocomplete="username"
              class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
              placeholder="admin"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input
              name="password"
              type="password"
              autocomplete="current-password"
              class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
              placeholder="••••••••"
              required
            />
          </div>

          <button
            type="submit"
            class="w-full rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 shadow-sm">
            Login
          </button>
        </form>
      </div>

    </div>
  </div>
</body>
  <!-- Notyf (toast notifications) -->
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script>
    (function () {
      // Notyf instance
      var notyf = new Notyf({
        duration: 4500,
        ripple: false,
        dismissible: true,
        position: { x: 'right', y: 'top' }
      });

      // 1) Direct `error` passed from Flask (render_template(..., error=...))
      {% if error %}
        notyf.error({{ error | tojson }});
      {% endif %}

      // 2) Flask flash messages (flash(msg, category))
      // Requires `flash(...)` on server side.
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            {% if category in ['error', 'danger'] %}
              notyf.error({{ message | tojson }});
            {% elif category in ['success'] %}
              notyf.success({{ message | tojson }});
            {% else %}
              // default
              notyf.open({ type: 'info', message: {{ message | tojson }} });
            {% endif %}
          {% endfor %}
        {% endif %}
      {% endwith %}
    })();
  </script>
</html>
