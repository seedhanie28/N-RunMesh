<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">N-RunMesh</title>
  <desc id="desc">Distributed job scheduling, connected.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".5" stop-color="#071827"/>
      <stop offset="1" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="accent" x1="72" y1="80" x2="1120" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset=".52" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#14b8a6" stop-opacity=".28"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="38"/></filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#2dd4bf" flood-opacity=".65"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#94a3b8" stroke-opacity=".055"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#background)"/>
  <rect width="1200" height="400" rx="28" fill="url(#grid)"/>
  <circle cx="1050" cy="80" r="240" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="160" cy="370" r="180" fill="url(#glow)" filter="url(#blur)" opacity=".7"/>

  <g opacity=".42" stroke="url(#accent)" stroke-width="2">
    <path d="M745 91L845 50l91 77 109-57 86 76"/>
    <path d="M745 91l58 105 133-69 64 111 131-92"/>
    <path d="M803 196l82 100 115-58 79 84"/>
    <path d="M885 296l-35 65M1079 322l66 39"/>
  </g>
  <g fill="#0f172a" stroke="url(#accent)" stroke-width="4" filter="url(#nodeGlow)">
    <circle cx="745" cy="91" r="10"/>
    <circle cx="845" cy="50" r="8"/>
    <circle cx="936" cy="127" r="12"/>
    <circle cx="1045" cy="70" r="8"/>
    <circle cx="1131" cy="146" r="11"/>
    <circle cx="803" cy="196" r="13"/>
    <circle cx="1000" cy="238" r="14"/>
    <circle cx="885" cy="296" r="10"/>
    <circle cx="1079" cy="322" r="12"/>
    <circle cx="850" cy="361" r="7"/>
    <circle cx="1145" cy="361" r="7"/>
  </g>

  <g transform="translate(80 92)">
    <rect width="146" height="146" rx="38" fill="#07111f" stroke="#334155" stroke-width="2"/>
    <path d="M36 108V38l74 70V38" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="36" cy="38" r="8" fill="#34d399"/>
    <circle cx="36" cy="108" r="8" fill="#2dd4bf"/>
    <circle cx="110" cy="38" r="8" fill="#38bdf8"/>
    <circle cx="110" cy="108" r="8" fill="#0ea5e9"/>
    <circle cx="73" cy="73" r="9" fill="#f8fafc"/>
    <circle cx="73" cy="73" r="4" fill="#0f766e"/>
  </g>

  <text x="258" y="168" fill="#f8fafc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">N-RunMesh</text>
  <text x="262" y="217" fill="#94a3b8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="23" letter-spacing="3">DISTRIBUTED JOB SCHEDULER</text>
  <rect x="262" y="251" width="377" height="2" rx="1" fill="url(#accent)" opacity=".85"/>
  <text x="262" y="298" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20">Schedule. Dispatch. Observe. Everywhere.</text>

  <g transform="translate(80 330)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">
    <rect width="164" height="34" rx="17" fill="#0f2f2c" stroke="#115e59"/>
    <circle cx="21" cy="17" r="5" fill="#34d399"/>
    <text x="36" y="22" fill="#a7f3d0">Controller online</text>
    <rect x="176" width="150" height="34" rx="17" fill="#10253b" stroke="#075985"/>
    <path d="M196 11v12m-6-6h12" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
    <text x="211" y="22" fill="#bae6fd">Agents connected</text>
  </g>
</svg>
